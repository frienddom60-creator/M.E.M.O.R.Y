<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Shwe Yee Win</title>
    <style>
        body { 
            background: #000; color: #fff; text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        /* Floating Stars/Hearts Effect */
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .name-header { 
            color: #f1c40f; font-size: 28px; margin-bottom: 20px; font-weight: bold; 
            text-shadow: 0 0 15px rgba(241,196,15,0.6); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .card { 
            width: 85%; max-width: 350px; padding: 35px 20px; 
            background: rgba(15, 15, 15, 0.95); border: 2px solid #f1c40f; 
            border-radius: 30px; box-shadow: 0 0 30px rgba(241,196,15,0.15);
            backdrop-filter: blur(5px);
        }
        .icon-circle { font-size: 50px; margin-bottom: 15px; transition: transform 0.3s; }
        .msg-text { 
            font-size: 20px; line-height: 1.6; min-height: 120px; 
            display: flex; align-items: center; justify-content: center; 
            opacity: 1; transition: all 0.5s ease;
        }
        #counter { 
            font-size: 18px; color: #f1c40f; margin-top: 20px; 
            padding-top: 15px; border-top: 1px dashed rgba(241,196,15,0.3);
        }
        .btn { 
            margin-top: 30px; background: linear-gradient(45deg, #f1c40f, #d4ac0d); 
            color: #000; border: none; padding: 15px 40px; border-radius: 50px; 
            font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(241,196,15,0.4); transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(241,196,15,0.5); }
    </style>
</head>
<body>
    <div class="bg-animation" id="bg"></div>
    <div class="name-header">For ရွှေရည်ဝင်း ✨</div>
    <div class="card">
        <div class="icon-circle" id="icon">🇯🇵</div>
        <div class="msg-text" id="msg">ဂျပန်မှာ အဆင်ပြေပါစေ... နင်မရှိပေမယ့် ငါတို့တွေ အမြဲရှိနေမှာပါ</div>
        <div id="counter">Loading...</div>
    </div>
    <button class="btn" onclick="nextStep()">Next Memory 💌</button>

    <script>
        const data = [
            { icon: "🇯🇵", txt: "ဂျပန်မှာ အဆင်ပြေပါစေ... နင်မရှိပေမယ့် ငါတို့တွေ အမြဲရှိနေမှာပါ" },
            { icon: "🌸", txt: "နင်သွားမယ့်လမ်းခရီးမှာ ပန်းခင်းသောလမ်းလေး ဖြစ်ပါစေနော်" },
            { icon: "🍱", txt: "အစားမှန်မှန်စားဖို့နဲ့ အိပ်ရေးဝဝအိပ်ဖို့လည်း မမေ့နဲ့ဦး" },
            { icon: "🧣", txt: "ဂျပန်က အေးတော့ နွေးနွေးထွေးထွေးနေပါ" },
            { icon: "🦁", txt: "Xiao Zhan ပြောသလိုပဲ မုန်တိုင်းတွေပြီးရင် သာယာလာဦးမှာပါ" },
            { icon: "❤️", txt: "နောင်တစ်ချိန် ပြန်ဆုံကြတဲ့အခါ အရင်ထက်ပိုပြီး ပျော်ကြရအောင်" },
            { icon: "🕊️", txt: "နင်သွားမယ့်နေရာမှာ သူငယ်ချင်းကောင်းတွေ အများကြီးရပါစေ" },
            { icon: "🏠", txt: "ပင်ပန်းတဲ့အခါတိုင်း ငါတို့တွေ ဒီမှာ အမြဲရှိနေတယ်နော်" },
            { icon: "💪", txt: "အခက်အခဲတွေရှိရင်လည်း အားမလျော့ဘဲ ကြံ့ကြံ့ခံနိုင်ပါစေ" },
            { icon: "💌", txt: "ဂရုစိုက်ပါ... ငါအမြဲရှိနေတယ်ဆိုတာ မမေ့နဲ့" }
        ];

        let i = 0;
        function nextStep() {
            const msgDiv = document.getElementById('msg');
            const iconDiv = document.getElementById('icon');
            msgDiv.style.transform = "scale(0.9)";
            msgDiv.style.opacity = 0;
            
            setTimeout(() => {
                i = (i + 1) % data.length;
                iconDiv.innerText = data[i].icon;
                msgDiv.innerText = data[i].txt;
                msgDiv.style.transform = "scale(1)";
                msgDiv.style.opacity = 1;
            }, 400);
        }

        function updateCounter() {
            const targetDate = new Date("2026-03-01"); 
            const now = new Date();
            const diff = now - targetDate;
            const counterDiv = document.getElementById("counter");
            if (diff < 0) { counterDiv.innerHTML = "မကြာခင် ရောက်တော့မယ် 😊"; }
            else {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                counterDiv.innerHTML = days + " ရက်မြောက်နေ့ 🇯🇵";
            }
        }
        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
